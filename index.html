<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Draft Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ─── HEADER ─── -->
  <header id="header" class="hidden">
    <div class="header-left">
      <h1 class="logo">Fantasy Draft Board</h1>
      <div id="clock-status" class="clock-status"></div>
    </div>
    <nav id="header-nav" class="header-nav">
      <!-- Buttons injected by JS based on draft state -->
    </nav>
  </header>

  <!-- ─── DRAFT BOARD ─── -->
  <main id="board-container" class="board-container hidden">
    <table id="draft-board">
      <thead id="board-head"></thead>
      <tbody id="board-body"></tbody>
    </table>
  </main>

  <!-- ─── ON THE CLOCK BANNER ─── -->
  <div id="on-the-clock" class="on-the-clock hidden">
    <div class="otc-inner">
      <div class="otc-meta">
        <span id="otc-pick-num"></span>
      </div>
      <div id="otc-team" class="otc-team"></div>
      <div id="otc-timer" class="otc-timer">0:00</div>
      <button id="otc-draft-btn" class="btn btn-gold">Draft Player</button>
    </div>
  </div>

  <!-- ─── MODAL BACKDROP ─── -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div id="modal" class="modal" role="dialog">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ─── FIREBASE ─── -->
  <!--
    SETUP INSTRUCTIONS:
    1. Go to https://console.firebase.google.com
    2. Create a project (e.g. "fantasy-draft-board")
    3. Add a Web App and copy your config
    4. Enable Realtime Database (start in test mode for now)
    5. Replace the firebaseConfig below with your values
  -->
  <!-- ─── LOGIN SCREEN ─── -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="login-logo">Fantasy Draft Board</h1>
      <p class="login-subtitle">Sign in to join the draft</p>
      <button id="google-sign-in" class="btn-google" onclick="Auth.signIn()">
        <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:10px;flex-shrink:0">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
      <p class="login-hint">Spectators can view the board without signing in</p>
      <button class="btn login-spectator-btn" onclick="Auth.spectate()">Continue as Spectator</button>
    </div>
  </div>

  <!-- ─── USER BAR (shown when logged in) ─── -->
  <div id="user-bar" class="user-bar hidden">
    <div class="user-info">
      <img id="user-avatar" class="user-avatar" src="" alt="" />
      <span id="user-name" class="user-name"></span>
      <span id="user-role" class="user-role-badge"></span>
    </div>
    <button class="btn btn-sm" onclick="Auth.signOut()">Sign Out</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBF6WYqL4n2yiuVSDthb-Yt9E8VEyrHl3U",
        authDomain: "stamperleaguedraftboard.firebaseapp.com",
        projectId: "stamperleaguedraftboard",
        storageBucket: "stamperleaguedraftboard.firebasestorage.app",
        messagingSenderId: "11449370579",
        appId: "1:11449370579:web:62b713a0d4b3a1ddd55126"
      };

    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
    window.auth = firebase.auth();
  </script>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/firebase-sync.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
